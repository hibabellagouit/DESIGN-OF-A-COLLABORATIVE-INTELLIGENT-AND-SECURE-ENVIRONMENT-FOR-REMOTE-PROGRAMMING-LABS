name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI_TEST: mongodb://127.0.0.1:27017/tp_projets_integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Lint backend
        working-directory: backend
        run: npm run lint
      - name: Audit backend dependencies
        working-directory: backend
        run: npm run audit:ci
      - name: Unit tests
        working-directory: backend
        env:
          JWT_SECRET: ci_test_secret
        run: npm run test:unit
      - name: Integration tests
        working-directory: backend
        env:
          CI: true
          JWT_SECRET: ci_test_secret
          SANDBOX_AUTO_ON_SUBMIT: "false"
          MONGODB_URI_TEST: mongodb://127.0.0.1:27017/tp_projets_integration
          INTEGRATION_TEST_MOCK_GITHUB: "true"
          INTEGRATION_TEST_MOCK_SANDBOX: "true"
        run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Audit frontend (rapport high, échec si critical)
        working-directory: frontend
        run: |
          npm run audit:report || true
          npm run audit:ci
      - name: Build frontend
        working-directory: frontend
        env:
          CI: true
        run: npm run build
